name: Android Debug APK

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.1.0"

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          version_code=$(grep -m1 "versionCode =" app/build.gradle.kts | grep -oE "[0-9]+")
          version_name=$(grep -m1 "versionName =" app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meeting-minutes-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk meeting-minutes-debug.apk
          cat > release-notes.md <<'NOTES'
          versionCode: ${{ steps.app_version.outputs.version_code }}
          versionName: ${{ steps.app_version.outputs.version_name }}

          本次发布包含新的会议库 APK。
          NOTES
          gh release create "$GITHUB_REF_NAME" meeting-minutes-debug.apk \
            --title "会议库 $GITHUB_REF_NAME" \
            --notes-file release-notes.md
